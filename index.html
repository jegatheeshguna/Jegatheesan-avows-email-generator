<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo — Cold Email Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    color: #a89dff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
  }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
  }

  input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  }

  select option { background: var(--surface2); }

  textarea { height: 90px; line-height: 1.6; }

  .tone-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .tone-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tone-btn:hover { border-color: var(--accent); color: var(--text); }

  .tone-btn.active {
    background: rgba(108,99,255,0.15);
    border-color: var(--accent);
    color: #a89dff;
  }

  .generate-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.4s;
  }

  .generate-btn:hover::before { left: 100%; }
  .generate-btn:hover { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.3); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .output-card.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .copy-btn:hover { border-color: var(--success); color: var(--success); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .subject-line {
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .subject-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .email-body {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    background: var(--surface2);
    border-radius: 10px;
    padding: 20px;
    border: 1px solid var(--border);
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .loading.visible { display: block; }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  .error-msg {
    background: rgba(255,101,132,0.1);
    border: 1px solid rgba(255,101,132,0.3);
    border-radius: 10px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 14px 18px;
    display: none;
    margin-top: 16px;
  }

  .error-msg.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  @media (max-width: 580px) {
    .grid-2 { grid-template-columns: 1fr; }
    .tone-grid { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Leo × Avows Technologies</div>
    <h1>Cold Email<br><span>Generator</span></h1>
    <p class="subtitle">AI-powered outreach for Account Managers</p>
  </header>

  <div class="card">
    <div class="section-label">Prospect Details</div>
    <div class="grid-2">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="e.g. Sarah" />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="e.g. Johnson" />
      </div>
      <div class="field">
        <label>Their Role / Title</label>
        <input type="text" id="role" placeholder="e.g. Head of Engineering" />
      </div>
      <div class="field">
        <label>Company Name</label>
        <input type="text" id="company" placeholder="e.g. Acme Corp" />
      </div>
      <div class="field full">
        <label>Industry / Company Context</label>
        <input type="text" id="industry" placeholder="e.g. Fintech startup, 200 employees, recently raised Series B" />
      </div>
      <div class="field full">
        <label>Pain Point or Hook (optional)</label>
        <textarea id="painPoint" placeholder="e.g. They've been posting 5+ tech roles on LinkedIn for 3 months, seems like they're struggling to hire..."></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Your Goal</div>
    <div class="grid-2">
      <div class="field full">
        <label>What's the objective of this email?</label>
        <select id="goal">
          <option value="intro_call">Book an intro call</option>
          <option value="partnership">Propose a staffing partnership</option>
          <option value="specific_role">Fill a specific open role</option>
          <option value="follow_up">Warm follow-up after no reply</option>
          <option value="referral">Ask for a referral</option>
        </select>
      </div>
    </div>

    <div style="margin-top: 20px;">
      <label style="display:block; margin-bottom:12px; font-size:12px; font-weight:600; letter-spacing:0.05em; color:var(--muted); text-transform:uppercase;">Email Tone</label>
      <div class="tone-grid">
        <button class="tone-btn active" data-tone="professional">Professional</button>
        <button class="tone-btn" data-tone="friendly">Friendly</button>
        <button class="tone-btn" data-tone="direct">Direct & Bold</button>
        <button class="tone-btn" data-tone="consultative">Consultative</button>
        <button class="tone-btn" data-tone="curious">Curious</button>
        <button class="tone-btn" data-tone="concise">Ultra-Short</button>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateEmail()">
    ✦ Generate Email
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading" id="loading">
    <p class="loading-dots">Leo is crafting your email</p>
  </div>

  <div class="output-card" id="outputCard">
    <div class="output-header">
      <div class="section-label" style="margin-bottom:0; flex:1;">Generated Email</div>
      <button class="copy-btn" id="copyBtn" onclick="copyEmail()">
        ⎘ Copy All
      </button>
    </div>
    <div class="subject-line">
      <div class="subject-label">Subject Line</div>
      <div id="subjectOutput"></div>
    </div>
    <div class="email-body" id="emailOutput"></div>
  </div>

</div>

<script>
  let selectedTone = 'professional';

  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTone = btn.dataset.tone;
    });
  });

  const goalDescriptions = {
    intro_call: "Book a short 15-20 minute intro call to explore working together",
    partnership: "Propose an ongoing staffing partnership where Avows Technologies provides recruitment services",
    specific_role: "Offer help filling a specific open role you've noticed they're struggling to hire for",
    follow_up: "Follow up warmly after a previous email that wasn't replied to",
    referral: "Ask if they can refer you to the right person who handles hiring/recruitment vendors"
  };

  const toneDescriptions = {
    professional: "polished, respectful, and business-appropriate",
    friendly: "warm, conversational, and approachable — like a colleague reaching out",
    direct: "bold, confident, and straight to the point — no fluff",
    consultative: "thoughtful, insight-driven, leading with value and expertise",
    curious: "genuinely curious about their situation, asking a smart question",
    concise: "extremely short — under 80 words total, punchy and easy to reply to"
  };

  async function generateEmail() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const role = document.getElementById('role').value.trim();
    const company = document.getElementById('company').value.trim();
    const industry = document.getElementById('industry').value.trim();
    const painPoint = document.getElementById('painPoint').value.trim();
    const goal = document.getElementById('goal').value;

    if (!firstName || !role || !company) {
      showError('Please fill in at least: First Name, Role, and Company.');
      return;
    }

    hideError();
    showLoading(true);
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('outputCard').classList.remove('visible');

    const prompt = `You are Leo, an AI assistant for Jega who is an Account Manager at Avows Technologies — a staffing and recruitment company.

Write a cold outreach email with the following details:

PROSPECT:
- Name: ${firstName} ${lastName}
- Role: ${role}
- Company: ${company}
- Industry/Context: ${industry || 'Not specified'}
- Pain Point / Hook: ${painPoint || 'Not specified'}

SENDER:
- Name: Jega
- Company: Avows Technologies (staffing & recruitment firm)
- Role: Account Manager

GOAL: ${goalDescriptions[goal]}

TONE: ${toneDescriptions[selectedTone]}

IMPORTANT RULES:
- Do NOT use generic openers like "I hope this email finds you well" or "My name is Jega and I work at..."
- Lead with something relevant to THEM — their company, role, or pain point
- Keep it under 150 words unless tone is "consultative"
- End with one clear, low-friction CTA
- Sound like a real human, not a template

Respond ONLY in this exact JSON format (no markdown, no backticks):
{"subject": "subject line here", "body": "email body here with \\n for line breaks"}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '';

      let parsed;
      try {
        const clean = text.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch {
        throw new Error('Could not parse response. Please try again.');
      }

      document.getElementById('subjectOutput').textContent = parsed.subject;
      document.getElementById('emailOutput').textContent = parsed.body;
      document.getElementById('outputCard').classList.add('visible');

    } catch (err) {
      showError('Something went wrong: ' + err.message);
    } finally {
      showLoading(false);
      document.getElementById('generateBtn').disabled = false;
    }
  }

  function copyEmail() {
    const subject = document.getElementById('subjectOutput').textContent;
    const body = document.getElementById('emailOutput').textContent;
    const full = `Subject: ${subject}\n\n${body}`;
    navigator.clipboard.writeText(full).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '⎘ Copy All';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('visible', show);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }
</script>
</body>
</html>
